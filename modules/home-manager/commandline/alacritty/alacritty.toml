[env]
TERM = "alacritty"

[window]
decorations = "None"
decorations_theme_variant = "Dark"
startup_mode = "Maximized"
dynamic_title = true
opacity = 1.0
blur = true
padding = { x = 10, y = 10 }

[mouse]
hide_when_typing = true
bindings = [
  { mouse = "Left", action = "ExpandSelection" },
	{ mouse = "Left", mods = "Shift", action = "Copy" },
  { mouse = "Middle", action = "PasteSelection" },
]

[keyboard]
bindings = [
	{ key = "V",      mods = "Control|Shift",  action = "Paste"          },
  { key = "C",      mods = "Control|Shift",  action = "Copy"           },
	{ key = "K", mods = "Control|Shift",      action = "IncreaseFontSize" },
  { key = "J",  mods = "Control|Shift",      action = "DecreaseFontSize" },
  { key = "Equals",   mods = "Control",      action = "ResetFontSize" },

  # SEARCH
  { key = "F",     mods = "Control|Shift", action = "SearchForward"          },
  { key = "B",     mods = "Control|Shift", action = "SearchBackward"         },

	{ key = "Return",    mode = "Search|~Vi", action = "SearchConfirm"         },
  { key = "Escape",    mode = "Search",     action = "SearchCancel"          },
  { key = "C",         mods = "Control", mode = "Search", action = "SearchCancel" },
  { key = "U",         mods = "Control", mode = "Search", action = "SearchClear"  },
  { key = "W",         mods = "Control", mode = "Search", action = "SearchDeleteWord" },
  { key = "P",         mods = "Control", mode = "Search", action = "SearchHistoryPrevious" },
  { key = "N",         mods = "Control", mode = "Search", action = "SearchHistoryNext"     },
  { key = "Return",    mods = "Shift",  mode = "Search|~Vi", action = "SearchFocusPrevious" },
  { key = "Tab",       mode = "Search|~Vi",  action = "SearchFocusNext"      },
  { key = "Tab",       mods = "Shift",  mode = "Search|~Vi", action = "SearchFocusPrevious" },

  # WINDOW MANAGEMENT
  { key = "N",          mods = "Control|Shift", action = "SpawnNewInstance"  },
  { key = "N",          mods = "Control|Alt",   action = "CreateNewWindow"   },
  { key = "Q",          mods = "Control|Shift", action = "Quit"              },
  { key = "F11",                                action = "ToggleFullscreen"  },
  { key = "F",          mods = "Control|Shift", action = "ToggleFullscreen"  },
  { key = "M",          mods = "Control|Shift", action = "ToggleMaximized"   },
  { key = "H",          mods = "Super",         action = "Hide"              },
  { key = "M",          mods = "Super",         action = "Minimize"          },

  # SCROLLING
  { key = "PageUp",   mods = "Shift",   action = "ScrollPageUp"      },
  { key = "PageDown", mods = "Shift",   action = "ScrollPageDown"    },
  { key = "Home",     mods = "Shift",   action = "ScrollToTop"       },
  { key = "End",      mods = "Shift",   action = "ScrollToBottom"    },

	# VI MODE
  { key = "Space",  mods = "Control|Shift", action = "ToggleViMode"       },
  { key = "Escape",      mode = "Vi|~Search",  action = "ClearSelection"  },
]

[cursor]
vi_mode_style = "Block"
thickness = 0.14
unfocused_hollow = true

[bell]
animation = "EaseOut"
duration = 10
color = "0x0ff4a6"

[selection]
save_to_clipboard = true

## Font
[font]
size = 12.0

[font.normal]
family = "CodeNewRoman Nerd Font"
style = "Regular"

[font.bold]
family = "CodeNewRoman Nerd Font"
style = "Bold"

[font.italic]
family = "CodeNewRoman Nerd Font"
style = "Italic"

[font.bold_italic]
family = "CodeNewRoman Nerd Font"
style = "Bold Italic"

[font.offset]
x = 0
y = 0

### Colors
[colors.primary]
background = "#000000"
foreground = "#f8f8f2"
bright_foreground = "#ffffff"

[colors.cursor]
text = "CellBackground"
cursor = "CellForeground"

[colors.vi_mode_cursor]
text = "CellBackground"
cursor = "CellForeground"

[colors.search.matches]
foreground = "#44475a"
background = "#50fa7b"

[colors.search.focused_match]
foreground = "#44475a"
background = "#ffb86c"

[colors.hints.start]
foreground = "#282a36"
background = "#f1fa8c"

[colors.hints.end]
foreground = "#f1fa8c"
background = "#282a36"

[colors.line_indicator]
foreground = "None"
background = "None"

[colors.selection]
text = "CellForeground"
background = "#44475a"

[colors.normal]
black   = "#111111"
red     = "#ff5555"
green   = "#50fa7b"
yellow  = "#f1fa8c"
blue    = "#bd93f9"
magenta = "#ff79c6"
cyan    = "#8be9fd"
white   = "#f8f8f2"

[colors.bright]
black   = "#6272a4"
red     = "#ff6e6e"
green   = "#69ff94"
yellow  = "#ffffa5"
blue    = "#d6acff"
magenta = "#ff92df"
cyan    = "#a4ffff"
white   = "#ffffff"
