live_config_reload = true

[env]
TERM = "alacritty"

[window]
decorations = "None"
decorations_theme_variant = "Dark"
startup_mode = "Maximized"
dynamic_title = true
opacity = 0.75
blur = true
padding = { x = 10, y = 10 }

[mouse]
hide_when_typing = true
bindings = [
	{ mouse = "Middle", mods = "Control", action = "Paste" },
]

[cursor]
vi_mode_style = "Block"
thickness = 0.14
unfocused_hollow = true

[bell]
animation = "EaseOut"
duration = 10
color = "0x0ff4a6"

[selection]
save_to_clipboard = true

## Font
[font]
size = 12.0

[font.normal]
family = "CodeNewRoman Nerd Font"
style = "Regular"

[font.bold]
family = "CodeNewRoman Nerd Font"
style = "Bold"

[font.italic]
family = "CodeNewRoman Nerd Font"
style = "Italic"

[font.bold_italic]
family = "CodeNewRoman Nerd Font"
style = "Bold Italic"

[font.offset]
x = 0
y = 0

### Colors
[colors.primary]
background = "#282a36"
foreground = "#f8f8f2"
bright_foreground = "#ffffff"

[colors.cursor]
text = "CellBackground"
cursor = "CellForeground"

[colors.vi_mode_cursor]
text = "CellBackground"
cursor = "CellForeground"

[colors.search.matches]
foreground = "#44475a"
background = "#50fa7b"

[colors.search.focused_match]
foreground = "#44475a"
background = "#ffb86c"

[colors.hints.start]
foreground = "#282a36"
background = "#f1fa8c"

[colors.hints.end]
foreground = "#f1fa8c"
background = "#282a36"

[colors.line_indicator]
foreground = "None"
background = "None"

[colors.selection]
text = "CellForeground"
background = "#44475a"

[colors.normal]
black   = "#21222c"
red     = "#ff5555"
green   = "#50fa7b"
yellow  = "#f1fa8c"
blue    = "#bd93f9"
magenta = "#ff79c6"
cyan    = "#8be9fd"
white   = "#f8f8f2"

[colors.bright]
black   = "#6272a4"
red     = "#ff6e6e"
green   = "#69ff94"
yellow  = "#ffffa5"
blue    = "#d6acff"
magenta = "#ff92df"
cyan    = "#a4ffff"
white   = "#ffffff"
